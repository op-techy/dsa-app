spring:
  application:
    name: dsaapp
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}